spring:
  application:
    name: lab-langchain4j

groq:
  # Groq에서 발급받은 API 키를 입력하세요.
  # 발급 방법: https://console.groq.com 접속 → 회원가입 → API Keys 메뉴에서 키 생성
  api-key: your_api_key
  # Groq는 OpenAI 호환 API를 제공합니다. LangChain4j OpenAI 클라이언트와 함께 사용합니다.
  # 주의: Spring AI와 달리 LangChain4j는 /v1을 자동으로 추가하지 않으므로 URL에 포함합니다.
  base-url: https://api.groq.com/openai/v1
  # Step 1~4 추천 모델 (무료, 빠름): llama-3.1-8b-instant
  # Step 5 (Tool Calling) 추천 모델: llama-3.3-70b-versatile
  model: llama-3.1-8b-instant
# model: llama-3.3-70b-versatile

logging:
  level:
    egovframework.lab.ai: DEBUG
    dev.langchain4j: WARN
