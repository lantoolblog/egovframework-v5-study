# HSQLDB Server (외부에서 별도 기동된 HSQLDB 서버에 접속)
#
# HSQLDB 서버 기동 예시 (별도 터미널):
#   java -cp hsqldb-2.7.4.jar org.hsqldb.server.Server \
#        --database.0 file:./sampledb --dbname.0 sampledb
#
# 위와 같이 기동했다면 기본 포트 9001 로 접속한다.

jdbc.driver=org.hsqldb.jdbc.JDBCDriver
jdbc.url=jdbc:hsqldb:hsql://localhost/sampledb
jdbc.username=sa
jdbc.password=
